        html { scroll-behavior: smooth; }

            transition: background 0.3s ease, color 0.3s ease;

                    /* Pill Navbar Style */
    .custom-pill-nav {
        position: fixed;
        top: 25px;
        left: 50%;
        transform: translateX(-50%);
        background: #1a1a1a !important;
        border-radius: 50px;
        padding: 8px 25px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 1000;
        width: max-content;
        min-width: 600px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        transition: all 0.3s ease;
    }
    
    .nav-left .nav-icon-circle {
        width: 40px;
        height: 40px;
        background: #fff;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #1a1a1a;
        font-size: 20px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .nav-center {
        display: flex;
        align-items: center;
        gap: 35px;
        margin: 0 45px;
    }

    .pill-nav-link {
        color: #ddd;
        text-decoration: none;
        font-weight: 500;
        font-size: 15px;
        transition: all 0.3s;
        position: relative;
    }

    .pill-nav-link::after {
        content: '';
        position: absolute;
        width: 0;
        height: 2px;
        bottom: -5px;
        left: 50%;
        background: linear-gradient(45deg, #be52df, #1d4a98);
        transition: all 0.3s ease;
        transform: translateX(-50%);
        border-radius: 2px;
    }

    .pill-nav-link:hover::after {
        width: 100%;
    }

    .pill-nav-link:hover {
        color: #fff;
        transform: translateY(-2px);
    }

    .nav-right .theme-btn {
        background: #fff;
        color: #1a1a1a;
        border: none;
        padding: 8px 18px;
        border-radius: 30px;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: transform 0.3s;
        display: inline-flex;
        align-items: center;
        gap: 5px;
    }

    .nav-right .theme-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 5px 15px rgba(255,255,255,0.2);
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
        .nav-center {
            display: none;
        }
        .custom-pill-nav {
            width: 90%;
            min-width: auto;
            padding: 8px 15px;
        }
    }

        /* Body Dark Mode Background */

        .footer::before {

        .social-icons a {

            font-size: 20px; border: 1px solid rgba(255,255,255,0.1);
            text-decoration: none;
        }
        .social-icons a:hover {

            transform: translateY(-10px) rotate(360deg);
            color: white; border-color: transparent;
            box-shadow: 0 10px 20px rgba(190, 82, 223, 0.4);

        #themeToggleBtn {

        }
        #themeToggleBtn:hover { transform: scale(1.05); }
        
        .main-container { padding-top: 120px; padding-bottom: 50px; }

        
        /* Hero Section */
        .hero-section {
            background: linear-gradient(135deg, #be52df, #1d4a98);
            color: white;
            padding: 150px 20px 150px;
            text-align: center;
            position: relative;
            overflow: hidden;
            margin-bottom: -100px;

        body.dark-mode .hero-section { background: linear-gradient(135deg, #2a2a4a, #4a2a6a); }

        .shape {
            position: absolute; filter: blur(60px); z-index: 0; animation: float 10s infinite alternate; border-radius: 50%; opacity: 0.6;
        }
        .shape-1 { width: 300px; height: 300px; background: rgba(255, 255, 255, 0.2); top: -10%; left: -5%; }
        .shape-2 { width: 400px; height: 400px; background: rgba(0, 0, 0, 0.2); bottom: -10%; right: -5%; animation-duration: 15s; }
        @keyframes float { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(-50px) scale(1.1); } }

        .hero-title { font-weight: 800; font-size: 3.5rem; margin-bottom: 20px; text-shadow: 0 5px 15px rgba(0,0,0,0.2); position: relative; z-index: 1;}

        .contact-info-card {

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        // Initialize Animate On Scroll
        AOS.init({
            once: true,
            offset: 50,
            duration: 800,
        });

        // Navbar Scroll Effect
        window.addEventListener('scroll', function() {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // Theme Toggle Logic
        document.addEventListener("DOMContentLoaded", () => {
            const themeToggleBtn = document.getElementById("themeToggleBtn");
            const savedTheme = localStorage.getItem("theme");

            if (savedTheme === "dark") {
                document.body.classList.add("dark-mode");
                if (themeToggleBtn) {
                    themeToggleBtn.innerHTML = '<i class="fas fa-sun"></i> Light';
                    themeToggleBtn.classList.replace('btn-light', 'btn-dark');
                }
            }

            if (themeToggleBtn) {
                themeToggleBtn.addEventListener("click", () => {
                    document.body.classList.toggle("dark-mode");
                    const isDark = document.body.classList.contains("dark-mode");
                    localStorage.setItem("theme", isDark ? "dark" : "light");

                    if (isDark) {
                        themeToggleBtn.innerHTML = '<i class="fas fa-sun"></i> Light';
                        themeToggleBtn.classList.replace('btn-light', 'btn-dark');
                    } else {
                        themeToggleBtn.innerHTML = '<i class="fas fa-moon"></i> Theme';
                        themeToggleBtn.classList.replace('btn-dark', 'btn-light');
                    }
                });
            }
        });
    </script>
