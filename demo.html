<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Project Unavailable</title>
    <link rel="website icon" type="image/jpg" href="images/myIcon.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1d4a98, #be52df);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .shape {
            position: absolute; filter: blur(60px); z-index: 0; animation: float 10s infinite alternate; border-radius: 50%; opacity: 0.5;
        }
        .shape-1 { width: 300px; height: 300px; background: rgba(255, 255, 255, 0.3); top: -10%; left: -5%; }
        .shape-2 { width: 400px; height: 400px; background: rgba(0, 0, 0, 0.3); bottom: -10%; right: -5%; animation-duration: 15s; }
        @keyframes float { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(-50px) scale(1.1); } }

        .maintenance-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 50px 40px;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 600px;
            width: 90%;
            position: relative;
            z-index: 1;
        }

        .maintenance-img {
            width: 180px;
            margin-bottom: 30px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
            animation: bounce-img 3s infinite ease-in-out;
        }

        @keyframes bounce-img {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        h2 {
            font-weight: 800;
            font-size: 2rem;
            margin-bottom: 15px;
            color: #ffffff;
            text-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        p {
            font-size: 1.1rem;
            font-weight: 300;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.9);
        }

        .btn-custom {
            background: #ffffff;
            color: #1d4a98;
            font-weight: 700;
            padding: 12px 30px;
            border-radius: 30px;
            border: none;
            transition: all 0.4s;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
        }
        .btn-custom:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            background: #fce408;
            color: #111;
        }
        .btn-outline-custom {
            background: transparent;
            border: 2px solid white;
            color: white;
            font-weight: 700;
            padding: 10px 28px;
            border-radius: 30px;
            transition: all 0.4s;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
        }
        .btn-outline-custom:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            background: white;
            color: #1d4a98;
        }
    </style>
</head>
<body>

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="maintenance-container" data-aos="zoom-in" data-aos-duration="1000">
        <img src="https://cdn-icons-png.flaticon.com/512/8088/8088605.png" alt="Maintenance Image" class="maintenance-img">
        <h2 data-aos="fade-up" data-aos-delay="200">Project Under Maintenance</h2>
        <p data-aos="fade-up" data-aos-delay="300">We are currently working on improvements and updates for this project. Stay tuned for the latest version!</p>
        <p data-aos="fade-up" data-aos-delay="400">Meanwhile, check out my GitHub for more projects.</p>
        
        <div data-aos="fade-up" data-aos-delay="500">
            <a href="project.html" class="btn-custom"><i class="fas fa-arrow-left me-2"></i>Return to Projects</a>
            <a href="https://github.com/ujjaval01" target="_blank" class="btn-outline-custom"><i class="fab fa-github me-2"></i>Visit GitHub</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true, offset: 50, duration: 800 });
    </script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
        const navCenter = document.querySelector('.nav-center');
        if (mobileMenuBtn && navCenter) {
            mobileMenuBtn.addEventListener('click', () => {
                navCenter.classList.toggle('active');
            });
        }
    });
</script>
</body>
</html>
