<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Project Unavailable</title>
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
<style>
    .maintenance-container {
      background: var(--surface);
      border: 1px solid var(--glass-border);
      padding: 50px 40px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      text-align: center;
      max-width: 600px;
      width: 90%;
      position: relative;
      z-index: 1;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .maintenance-img {
      width: 180px;
      margin-bottom: 30px;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15));
      animation: bounce-img 3s infinite ease-in-out;
    }
    @keyframes bounce-img {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    h2 {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 2rem;
      margin-bottom: 15px;
      color: var(--text);
    }
    p {
      font-size: 1.1rem;
      font-weight: 400;
      margin-bottom: 20px;
      color: var(--text-muted);
    }
</style>
    <link rel="stylesheet" href="style.css">
    <script>if(localStorage.getItem("theme")==="dark") document.documentElement.classList.add("dark-mode");</script>
</head>
<body>

    <div class="maintenance-container" data-aos="zoom-in" data-aos-duration="1000">
        <img src="https://cdn-icons-png.flaticon.com/512/8088/8088605.png" alt="Maintenance Image" class="maintenance-img" loading="lazy">
        <h2 data-aos="fade-up" data-aos-delay="200">Project Under Maintenance</h2>
        <p data-aos="fade-up" data-aos-delay="300">We are currently working on improvements and updates for this project. Stay tuned for the latest version!</p>
        <p data-aos="fade-up" data-aos-delay="400">Meanwhile, check out my GitHub for more projects.</p>
        
        <div data-aos="fade-up" data-aos-delay="500">
            <a href="project.html" class="btn-premium btn-premium-primary btn-magnetic"><i class="fas fa-arrow-left me-2"></i>Return to Projects</a>
            <a href="https://github.com/ujjaval01" target="_blank" class="btn-premium btn-premium-outline btn-magnetic"><i class="fab fa-github me-2"></i>Visit GitHub</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true, offset: 50, duration: 800 });
    </script>
    <script src="script.js" defer></script>
</body>
</html>
